name: CI Pipeline

# Triggers: runs on push/PR to main, dev, prod branches, and on version tags (e.g. v1.0.0)
on:
  push:
    branches: [ "main", "dev", "prod" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "dev", "prod" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Run your tests here.
      # Replace the echo commands with your actual test commands (e.g. npm test, pytest, go test ./...).
      # If this step fails, the pipeline stops and no image will be built.
      - name: Run Tests (Placeholder)
        run: |
          echo "Beste teams: Zet hier jullie eigen test-commando's!"
          echo "Als deze falen, zal Infra de image NIET bouwen."
          exit 0
