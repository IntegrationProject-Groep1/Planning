name: Deploy Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"] # Listens for the exact name of the CI pipeline (File 1)
    types:
      - completed

jobs:
  build-and-push:
    name: Build and Push Docker Image
    # Only runs if the CI pipeline succeeded AND the branch is 'main', 'prod', or a version tag (e.g. v1.0.0)
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.head_branch == 'main' ||
       github.event.workflow_run.head_branch == 'prod' ||
       startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read   # Read access to the repository
      packages: write  # Write access to publish to GitHub Container Registry (GHCR)

    steps:
      # Step 1: Check out the exact commit that was approved by the CI pipeline
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # Step 2: Convert the repo name to lowercase (GHCR requires lowercase image names)
      - name: Lowercase repo name
        id: repo_name
        run: echo "value=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      # Step 3: Authenticate with GitHub Container Registry using the built-in token
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 4: Build the Docker image and push it to GHCR with two tags:
      #   - :latest          → always points to the most recent successful build
      #   - :<branch/tag>    → e.g. :main, :prod, or :v1.2.0 for traceability
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.repo_name.outputs.value }}:latest
            ghcr.io/${{ steps.repo_name.outputs.value }}:${{ github.event.workflow_run.head_branch }}
