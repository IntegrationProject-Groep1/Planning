name: CI/CD Pipeline

on:
  push:
    tags:
      - 'v*' # Trigger bij een nieuwe release tag (bijv. v1.0.1)
    branches:
      - main
      - master
      - prod
      - production # Trigger bij een push of merge naar een van deze productie-branches

jobs:
  build-and-push:
    name: Build and Push Docker Image
    needs: [] # Placeholder: Vul hier de namen in van test-jobs als die aan deze file worden toegevoegd
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # STAP: Forceer repository naam naar lowercase voor Docker
      - name: Lowercase repo name
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Geef automatisch tags op basis van de repository naam en de git tag/branch
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}:latest
            ghcr.io/${{ env.REPO_LOWER }}:${{ github.ref_name }}